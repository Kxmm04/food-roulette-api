<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test Register</title>
  <style>
    body{font-family:system-ui,sans-serif;margin:20px;max-width:900px}
    input{padding:10px 12px;border:1px solid #ddd;border-radius:10px;width:100%;margin:6px 0}
    button{padding:10px 12px;border:1px solid #ddd;border-radius:10px;background:#fff;cursor:pointer}
    button:hover{background:#f7f7f7}
    pre{background:#111;color:#eee;padding:12px;border-radius:12px;overflow:auto}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:700px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <h2>Test Register</h2>

  <div class="row">
    <div>
      <label>Full name</label>
      <input id="full_name" value="Test User">
    </div>
    <div>
      <label>Email</label>
      <input id="email" value="test@example.com">
    </div>
  </div>

  <label>Password</label>
  <input id="password" value="123456">

  <button onclick="register()">Send POST /register.php</button>

  <h3>Response</h3>
  <pre id="out">(no response yet)</pre>

<script>
async function register(){
  const payload = {
    full_name: document.getElementById('full_name').value,
    email: document.getElementById('email').value,
    password: document.getElementById('password').value
  };

  const out = document.getElementById('out');
  out.textContent = "Loading...";

  try{
    const r = await fetch("./register.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const text = await r.text();
    out.textContent = `HTTP ${r.status}\n\n${text}`;
  }catch(e){
    out.textContent = "Error: " + e.message;
  }
}
</script>
</body>
</html>
